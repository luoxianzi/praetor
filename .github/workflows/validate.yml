name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Plugin manifests are valid JSON
        run: |
          jq empty .claude-plugin/plugin.json
          jq empty .claude-plugin/marketplace.json

      - name: Shell scripts parse
        run: |
          bash -n skills/dispatching-to-codex/preflight.sh
          bash -n docs/assets/demo-replay.sh

      - name: Skills, agents, and commands carry frontmatter
        run: |
          for f in skills/*/SKILL.md agents/*.md commands/*.md; do
            head -1 "$f" | grep -q '^---$' || { echo "missing frontmatter: $f"; exit 1; }
          done

      - name: Legion mode invariants (v0.2)
        run: |
          test -f skills/dispatching-legion/SKILL.md
          grep -q 'MANIFEST' skills/dispatching-legion/SKILL.md
          grep -q 'integration judge' skills/dispatching-legion/SKILL.md
          grep -qiE 'cap.*5|5 lanes' skills/dispatching-legion/SKILL.md
          grep -q 'MANIFEST' agents/codex-judge.md
          grep -q 'MANIFEST' skills/writing-codex-briefs/SKILL.md

      - name: Iron laws are intact (product law, see CLAUDE.md)
        run: |
          grep -q 'FAIL cannot be overridden' README.md
          grep -q 'FAIL cannot be overridden' skills/dispatching-to-codex/SKILL.md
          grep -qi 'frozen' skills/dispatching-to-codex/SKILL.md
          grep -qiE 'max 2|2 retries|retries.*2' skills/dispatching-to-codex/SKILL.md

      - name: Git-state boundary is intact (v0.1.2 law)
        run: |
          grep -q 'git-state operation' skills/dispatching-to-codex/SKILL.md
          grep -q 'writable roots' skills/dispatching-to-codex/SKILL.md
          grep -q 'run ANY git command' skills/writing-codex-briefs/SKILL.md

      - name: No command-line prompt interpolation (v0.1.3 law — briefs and re-briefs go via stdin)
        run: |
          test "$(grep -c 'PRAETOR_BRIEF' skills/dispatching-to-codex/SKILL.md)" -ge 4
          ! grep -qE 'resume <session-id> "' skills/dispatching-to-codex/SKILL.md

      - name: Audit hardening laws (v0.3.2 — user WIP is sacred, bars stay frozen, untracked files are judged)
        run: |
          # D1: the analysis shortcut must never wipe the whole tree
          grep -q 'never run either against the whole tree' skills/dispatching-to-codex/SKILL.md
          grep -q 'skip-git-repo-check' skills/dispatching-to-codex/SKILL.md
          # D2: FAIL cleanup discards the rejected tree before switching back
          grep -q "discard the branch's working tree first" skills/dispatching-to-codex/SKILL.md
          # D3: STOP resolves the git toplevel, not the shell cwd
          grep -q 'TOPLEVEL' skills/dispatching-to-codex/preflight.sh
          # D4: tamper check counts freeze commits, not just the dirty diff
          grep -q 'exactly ONE commit' agents/codex-judge.md
          # D5: judge reads untracked-file content in all modes
          grep -q 'status --porcelain' agents/codex-judge.md
          grep -q 'untracked file' agents/codex-judge.md
          # D6: the integration bar is a frozen file, not planner memory
          grep -q 'INTEGRATION.md' skills/dispatching-legion/SKILL.md
          grep -q 'INTEGRATION.md' agents/codex-judge.md
          # D7: relay sniff runs before the login gate
          grep -B30 'not-logged-in' skills/dispatching-to-codex/preflight.sh | grep -q 'CONFIG='
          # judge hardening: evidence is data, never instructions
          grep -qi 'never instructions' agents/codex-judge.md

      - name: Summoned-imperium consent law (v0.3.1 — dormant until summoned, never silent, brakes never weakened)
        run: |
          grep -qi 'dormant' skills/dispatching-to-codex/SKILL.md
          grep -qi 'summon' skills/dispatching-to-codex/SKILL.md
          grep -qi 'summon' skills/dispatching-legion/SKILL.md
          grep -qi 'announce' skills/dispatching-to-codex/SKILL.md
          grep -qi 'announce' skills/dispatching-legion/SKILL.md
          grep -q 'STOP' skills/dispatching-to-codex/SKILL.md
          ! grep -q 'NEVER auto-dispatch' skills/dispatching-to-codex/SKILL.md
          ! grep -q 'never automatically' AGENTS.md
