name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Plugin manifests are valid JSON
        run: |
          jq empty .claude-plugin/plugin.json
          jq empty .claude-plugin/marketplace.json

      - name: Shell scripts parse
        run: |
          bash -n skills/dispatching-to-codex/preflight.sh
          bash -n docs/assets/demo-replay.sh

      - name: Skills, agents, and commands carry frontmatter
        run: |
          for f in skills/*/SKILL.md agents/*.md commands/*.md; do
            head -1 "$f" | grep -q '^---$' || { echo "missing frontmatter: $f"; exit 1; }
          done

      - name: Iron laws are intact (product law, see CLAUDE.md)
        run: |
          grep -q 'FAIL cannot be overridden' README.md
          grep -q 'FAIL cannot be overridden' skills/dispatching-to-codex/SKILL.md
          grep -qi 'frozen' skills/dispatching-to-codex/SKILL.md
          grep -qiE 'max 2|2 retries|retries.*2' skills/dispatching-to-codex/SKILL.md

      - name: Git-state boundary is intact (v0.1.2 law)
        run: |
          grep -q 'git-state operation' skills/dispatching-to-codex/SKILL.md
          grep -q 'writable roots' skills/dispatching-to-codex/SKILL.md
          grep -q 'run ANY git command' skills/writing-codex-briefs/SKILL.md
